services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: resume_generator
      POSTGRES_USER: dheerajchand
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DEBUG: "True"
      SECRET_KEY: "dev-only-secret-key-not-for-production"
      DATABASE_URL: "postgresql://dheerajchand:devpassword@db:5432/resume_generator"
      DJANGO_SETTINGS_MODULE: "resume_generator_django.settings"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"

volumes:
  pgdata:
